name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    env:
      SQLX_OFFLINE: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Test
        run: cargo test --workspace --locked

  rust-security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm --prefix frontend ci

      - name: Audit dependencies
        run: npm --prefix frontend audit --audit-level=high --omit=dev

      - name: Lint
        run: npm --prefix frontend run release:check

      - name: Test
        run: npm --prefix frontend run test

  containers:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build --file Dockerfile.backend --tag gmed-backend:ci .

      - name: Build frontend image
        run: docker build --file frontend/Dockerfile --tag gmed-frontend:ci frontend

      - name: Validate release compose stack
        env:
          GMED_JWT_SECRET: ci-secret-at-least-32-characters-long!!
          GMED_MESSAGE_ENCRYPTION_KEYS: v1:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          GMED_MESSAGE_ENCRYPTION_KEY_ACTIVE: v1
          GMED_CORS_ORIGIN: http://localhost:8080
        run: docker compose -f docker-compose.yml -f docker-compose.release.yml config > /dev/null

  hygiene:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Repo hygiene
        run: python scripts/check_repo_hygiene.py
