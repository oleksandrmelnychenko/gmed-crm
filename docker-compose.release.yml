services:
  postgres:
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gmed} -d ${POSTGRES_DB:-gmed}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "${GMED_DATABASE_URL:-postgres://gmed:gmed@postgres:5432/gmed}"
      PORT: 3000
      JWT_SECRET: "${GMED_JWT_SECRET:?Set GMED_JWT_SECRET in your environment or release env file}"
      MESSAGE_ENCRYPTION_KEYS: "${GMED_MESSAGE_ENCRYPTION_KEYS:?Set GMED_MESSAGE_ENCRYPTION_KEYS in your environment or release env file}"
      MESSAGE_ENCRYPTION_KEY_ACTIVE: "${GMED_MESSAGE_ENCRYPTION_KEY_ACTIVE:-v1}"
      AUDIT_IP_SALT: "${GMED_AUDIT_IP_SALT:-}"
      CORS_ORIGIN: "${GMED_CORS_ORIGIN:-http://localhost:8080}"
      LEAD_INTAKE_TOKEN: "${GMED_LEAD_INTAKE_TOKEN:-}"
      RUST_LOG: "${GMED_RUST_LOG:-info,gmed_server=debug}"
      LOG_FORMAT: "${GMED_LOG_FORMAT:-json}"
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    restart: unless-stopped
    volumes:
      - uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      backend:
        condition: service_healthy
    environment:
      GMED_BACKEND_UPSTREAM: "${GMED_FRONTEND_BACKEND_UPSTREAM:-http://backend:3000}"
    ports:
      - "${FRONTEND_PORT:-8080}:8080"
    restart: unless-stopped

volumes:
  uploads:
